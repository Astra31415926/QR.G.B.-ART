            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .logo-text { 
            background: linear-gradient(90deg, #fff, #0088FF); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 20px rgba(0, 136, 255, 0.3);
        }

        .scan-line { 
            position: absolute; left: 0; right: 0; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--g-color), transparent); 
            box-shadow: 0 0 15px var(--g-color); 
            top: 0; z-index: 20;
            opacity: 0;
            display: none;
        }
        
        .scan-active .scan-line {
            display: block;
            opacity: 1;
            animation: scanMove 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes scanMove { 
            0% { top: 0%; opacity: 1; } 
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; } 
        }
        
        @keyframes flash { 
            0% { opacity: 0; } 
            20% { opacity: 0.9; } 
            100% { opacity: 0; } 
        }
        .flash-anim { animation: flash 0.4s ease-out; }

        .indicator { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: #222; 
            transition: all 0.3s; 
        }
        .active-r { background: var(--r-color); box-shadow: 0 0 12px var(--r-color); }
        .active-g { background: var(--g-color); box-shadow: 0 0 12px var(--g-color); }
        .active-b { background: var(--b-color); box-shadow: 0 0 12px var(--b-color); }
        
        .dropdown-menu { 
            transform: translateY(-10px); opacity: 0; visibility: hidden; 
            transition: all 0.2s ease; 
        }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
        
        .modal-overlay { 
            opacity: 0; visibility: hidden; transition: all 0.3s ease; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.show .modal-content { transform: scale(1); }

        .viewfinder-corners {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 15;
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; border-radius: 8px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; border-radius: 0 8px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; border-radius: 0 0 0 8px; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; border-radius: 0 0 8px 0; }
        
        .targeting .corner { border-color: var(--g-color); box-shadow: 0 0 10px var(--g-color); }
        
        .mode-camera .input-section { transform: translateY(-100%); opacity: 0; pointer-events: none; position: absolute; }

        .social-link { opacity: 0.5; transition: opacity 0.3s; }
        .social-link:hover { opacity: 1; }

<script>
    // === TRANSLATIONS & UI CONFIG ===

        },
        en: {
            menu_usage: "How to use", menu_tech: "Technology", menu_reset: "Reset All", menu_contact: "Download vCard",
            btn_save: "Save PNG", btn_camera: "Camera", btn_gallery: "Gallery", btn_close: "CLOSE",
            ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL",
            m_usage_title: "📝 Usage", 
            m_usage_body: "<p><b>1. Create:</b> Enter text into R, G, B fields. Code generates automatically.</p><p><b>2. Scan:</b> Tap 'Camera' and point at a color QR code.</p><p><b>3. Result:</b> Data fills into respective channels.</p>",
            m_tech_title: "⚙️ SCI Technology", 
            m_tech_body: `<p>Colored QR codes are correctly read in digital form — from a screen or image.</p><p>However, for transfer to a physical medium, standard CMYK printing is not suitable: it distorts the color structure and destroys data.</p><p>To maintain the code's functionality, it is necessary to use a special color model described in this technology.</p><p><a href='https://zenodo.org/records/19633526' style='color:#0088FF' target='_blank'>Read on Zenodo</a></p>`
        }
    };

    // === DOM ELEMENTS ===
    const els = {
        r: document.getElementById('r-text'), 
        g: document.getElementById('g-text'), 
        b: document.getElementById('b-text'),
        main: document.getElementById('qr-main'), 
        ctx: document.getElementById('qr-main').getContext('2d', { willReadFrequently: true }),
        mini: document.getElementById('mini-qr'),
        video: document.getElementById('video'), 
        freeze: document.getElementById('freeze-frame'),
        fCtx: document.getElementById('freeze-frame').getContext('2d', { willReadFrequently: true }),
        centralContainer: document.getElementById('central-container'), 
        flash: document.getElementById('flash-layer'),
        viewfinder: document.getElementById('viewfinder-ui'),
        dropdown: document.getElementById('dropdown')
    };

    // === STATE MANAGEMENT (Hybrid Logic) ===
    const state = {
        scanning: false,
        locked: { r: false, g: false, b: false },
        results: { r: null, g: null, b: null },
        activeSearch: false,
        standardFailCount: 0,
        AUTO_TRIGGER_THRESHOLD: 90, // ~3 seconds
        time: 0,
        config: {
            R: { offset: 0, gain: 1.0, k1: 0.10, k2: 0.20 },
            G: { offset: 0, gain: 1.0, k1: 0.18, k2: 0.33 },
            B: { offset: 0, gain: 1.0, k1: 0.05, k2: 0.13 }
        }
    };

    let currentLang = 'uk';

    // === 1. QR GENERATION ===
    function generateQR() {
        const texts = [els.r.value, els.g.value, els.b.value];
        if (!texts.some(t => t.trim())) {
            els.main.style.opacity = 0.1;
            document.getElementById('save-btn').classList.add('hidden');
            return;
        }
        els.main.style.opacity = 1;
        els.freeze.classList.add('hidden');
        els.video.classList.add('hidden');
        document.body.classList.remove('mode-camera');
        els.viewfinder.classList.add('hidden');
        
        let maxVer = 1;
        texts.forEach(t => {
            if(!t.trim()) return;
            const tmp = qrcode(0, 'M'); 
            tmp.addData(unescape(encodeURIComponent(t))); tmp.make();
            const v = Math.floor((tmp.getModuleCount() - 17) / 4);
            if (v > maxVer) maxVer = v;
        });
        
        const ctx = els.ctx;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
        ctx.globalCompositeOperation = "lighten";
        
        texts.forEach((text, i) => {
            if(!text.trim()) return;
            const qr = qrcode(maxVer, 'M'); 
            qr.addData(unescape(encodeURIComponent(text))); qr.make();
            const mod = 512 / qr.getModuleCount();
            ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
            for (let r = 0; r < qr.getModuleCount(); r++) {
                for (let c = 0; c < qr.getModuleCount(); c++) {
                    if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                }
            }
        });
        ctx.globalCompositeOperation = "source-over";
        document.getElementById('save-btn').classList.remove('hidden');
        els.mini.getContext('2d').drawImage(els.main, 0, 0, 32, 32);
    }

    // === 2. ALGORITHMS ===
    
    // A. Standard Bradley (Reliable Baseline)
    function applyBradleyStandard(imgData, chIdx) {
        const w = imgData.width, h = imgData.height;
        const input = imgData.data;
        const output = new Uint8ClampedArray(w * h * 4);
        const intImg = new Int32Array(w * h);
        const s = Math.floor(w / 8), t = 15;

        for (let y = 0; y < h; y++) {
            let sum = 0;
            for (let x = 0; x < w; x++) {
                sum += input[(y * w + x) * 4 + chIdx];
                intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
            }
        }

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                const count = (x2 - x1) * (y2 - y1);
                const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                const val = input[(y * w + x) * 4 + chIdx];
                const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                const idx = (y * w + x) * 4;
                output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
            }
        }
        return output;
    }

    // B. SCI Math (Active Search Manipulation)
    function applySCIMath(imgData, ch, cfg) {
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];
            let target, n1, n2;
            
            if (ch === 'R') { target = r; n1 = g; n2 = b; }
            else if (ch === 'G') { target = g; n1 = r; n2 = b; }
            else { target = b; n1 = r; n2 = g; }

            let res = (target - (n1 * cfg.k1 + n2 * cfg.k2)) * cfg.gain + cfg.offset;
            res = Math.max(0, Math.min(255, res));
            d[i] = res; d[i+1] = res; d[i+2] = res; d[i+3] = 255;
        }
    }

    // Triangle Wave Oscillator
    function getOscParam(t, period, min, max) {
        const cycle = t % period;
        const half = period / 2;
        const pos = (cycle < half) ? cycle / half : (period - cycle) / half;
        return min + pos * (max - min);
    }

    // === 3. MAIN HYBRID LOOP ===
    function processLoop() {
        if (!state.scanning) return;

        // 1. Get Fresh Data
        let sourceCopy = null;
        if (els.video.style.display !== 'none' && els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
            els.ctx.drawImage(els.video, 0, 0, 512, 512);
            sourceCopy = els.ctx.getImageData(0, 0, 512, 512);
        } else if (els.freeze.style.display !== 'none') {
            sourceCopy = els.fCtx.getImageData(0, 0, 512, 512);
        }

        if (sourceCopy) {
            let foundAny = false;
            
            // === STRATEGY SWITCH ===
            if (state.standardFailCount > state.AUTO_TRIGGER_THRESHOLD) {
                if (!state.activeSearch) {
                    state.activeSearch = true;
                    console.log("Switching to Active Search Mode");
                }
            }

            if (state.activeSearch) {
                // --- ACTIVE SEARCH MODE ---
                state.time++;
                const gain = getOscParam(state.time, 100, 0.5, 3.5);
                const offset = getOscParam(state.time, 250, -80, 0);
                
                ['R', 'G', 'B'].forEach(ch => {
                    const chLower = ch.toLowerCase();
                    if (!state.locked[chLower]) {
                        const cfg = state.config[ch];
                        cfg.gain = gain;
                        cfg.offset = offset;

                        let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                        applySCIMath(workData, ch, cfg);
                        let mono = applyBradleyStandard(workData, 0);
                        
                        const code = jsQR(mono, 512, 512, { inversionAttempts: "attemptBoth" });
                        if (code) {
                            foundAny = true;
                            lockChannel(ch, code.data);
                        }
                    }
                });
                
                if (!foundAny) {
                     // Visual debug (optional)
                     /* let lastCh = ['R', 'G', 'B'].find(c => !state.locked[c.toLowerCase()]) || 'B';
                     let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                     applySCIMath(workData, lastCh, state.config[lastCh]);
                     applyBradleyStandard(workData, 0); 
                     els.ctx.putImageData(workData, 0, 0); */
                }

            } else {
                // --- STANDARD MODE ---
                state.standardFailCount++;
                
                ['R', 'G', 'B'].forEach((ch, idx) => {
                    const chLower = ch.toLowerCase();
                    if (!state.locked[chLower]) {
                        const mono = applyBradleyStandard(sourceCopy, idx);
                        const code = jsQR(mono, 512, 512, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            foundAny = true;
                            lockChannel(ch, code.data);
                        }
                    }
                });
                
                if (!foundAny) els.ctx.putImageData(sourceCopy, 0, 0);
            }
        }

        requestAnimationFrame(processLoop);
    }

    // === 4. SUCCESS HANDLING ===
    function lockChannel(ch, data) {
        state.locked[ch.toLowerCase()] = true;
        state.results[ch.toLowerCase()] = data;
        
        playBeep();
        flashScreen();
        
        const el = els[ch.toLowerCase()];
        el.value = data;
        el.style.borderColor = ch === 'R' ? '#FF004D' : (ch === 'G' ? '#00FF41' : '#0088FF');
        el.style.borderWidth = '2px';
        
        generateQR(); // Update generated QR

        if (state.locked.r && state.locked.g && state.locked.b) {
             console.log("All channels decoded");
             stopCamera();
        }
    }

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 880; o.type = "square";
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            o.start(); o.stop(ctx.currentTime + 0.1);
        } catch(e){}
    }

    function flashScreen() {
        els.flash.classList.add('flash-anim');
        setTimeout(() => els.flash.classList.remove('flash-anim'), 400);
    }

    // === 5. CAMERA & FILE HANDLING ===
    async function startCamera() {
        globalReset();
        document.body.classList.add('mode-camera');
        els.viewfinder.classList.remove('hidden');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
            els.video.srcObject = stream;
            els.video.play();
            els.video.classList.remove('hidden');
            els.main.style.opacity = 0;
            els.freeze.classList.add('hidden');
            
            state.scanning = true;
            state.standardFailCount = 0;
            state.activeSearch = false;
            state.time = 0;
            
            processLoop();
        } catch (e) { alert("Camera Error: " + e); }
    }

    function stopCamera() {
        state.scanning = false;
        if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
        els.video.classList.add('hidden');
        els.main.style.opacity = 1;
        document.body.classList.remove('mode-camera');
    }

    function handleFile(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                els.freeze.width = 512; els.freeze.height = 512;
                const s = Math.min(img.width, img.height);
                const sx = (img.width - s)/2, sy = (img.height - s)/2;
                els.fCtx.drawImage(img, sx, sy, s, s, 0, 0, 512, 512);
                
                els.freeze.classList.remove('hidden');
                els.video.classList.add('hidden');
                els.main.style.opacity = 0;

                state.scanning = true;
                state.standardFailCount = 50; // Kickstart Active Search for files
                state.activeSearch = true;
                state.time = 0;
                
                processLoop();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function globalReset() {
        stopCamera();
        els.r.value = ""; els.g.value = ""; els.b.value = "";
        els.r.style.borderColor = 'rgba(255,255,255,0.1)';
        els.g.style.borderColor = 'rgba(255,255,255,0.1)';
        els.b.style.borderColor = 'rgba(255,255,255,0.1)';
        
        state.locked = {r:false, g:false, b:false};
        state.results = {r:null, g:null, b:null};
        state.standardFailCount = 0;
        state.activeSearch = false;
        
        generateQR(); 
        els.main.classList.remove('hidden'); 
        els.freeze.classList.add('hidden');
        els.viewfinder.classList.add('hidden');
        document.body.classList.remove('mode-camera');
    }

    // === 6. UI UTILS ===
    function setLanguage(l) {
        currentLang = l;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[l][key]) el.textContent = translations[l][key];
        });
        els.r.placeholder = translations[l].ph_r;
        els.g.placeholder = translations[l].ph_g;
        els.b.placeholder = translations[l].ph_b;
    }

    function openModal(t) {
        document.getElementById('modal-title').textContent = translations[currentLang]['m_'+t+'_title'];
        document.getElementById('modal-body').innerHTML = translations[currentLang]['m_'+t+'_body'];
        document.getElementById('modal-overlay').classList.add('show');
        els.dropdown.classList.remove('show');
    }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
    function triggerFileInput() { document.getElementById('file-input').click(); }
    function saveQR() { const a = document.createElement('a'); a.download = 'Spectrum-3D-QR.png'; a.href = els.main.toDataURL(); a.click(); }

    // === INIT ===
    [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
    document.getElementById('menu-btn').onclick = (e) => { 
        e.stopPropagation(); 
        els.dropdown.classList.toggle('show'); 
    };
    document.onclick = () => els.dropdown.classList.remove('show');
    
    setLanguage('uk');
    generateQR();
</script>
</body>
</html>
