<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="icon" type="image/png" href="./icon-192.png">
    
    <title>RGB-11: SCI Multi-Layer QR Encoder</title>
    <meta name="description" content="Encode 3 QR codes in 1 image. Spectral separation via SCI Model.">
    
    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <link rel="canonical" href="https://astra31415926.github.io/QR.G.B.-ART/">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --r-color: #FF004D;
            --g-color: #00FF41;
            --b-color: #0088FF;
            --bg-color: #050505;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        textarea {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Inter', sans-serif;
            resize: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.4);
            background: rgba(30, 30, 30, 0.9);
        }
        
        .logo-q { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .logo-r { color: var(--r-color); text-shadow: 0 0 15px var(--r-color); }
        .logo-g { color: var(--g-color); text-shadow: 0 0 15px var(--g-color); }
        .logo-b { color: var(--b-color); text-shadow: 0 0 15px var(--b-color); }

        .scan-line { 
            position: absolute; left: 0; right: 0; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--g-color), transparent); 
            box-shadow: 0 0 15px var(--g-color); 
            top: 0; z-index: 20;
            opacity: 0; display: none;
        }
        .scan-active .scan-line { display: block; opacity: 1; animation: scanMove 2s linear forwards; }
        
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; opacity: 0; } }
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 0.9; } 100% { opacity: 0; } }
        .flash-anim { animation: flash 0.4s ease-out; }

        .indicator { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: all 0.3s; }
        .active-r { background: var(--r-color); box-shadow: 0 0 12px var(--r-color); }
        .active-g { background: var(--g-color); box-shadow: 0 0 12px var(--g-color); }
        .active-b { background: var(--b-color); box-shadow: 0 0 12px var(--b-color); }
        
        .dropdown-menu { transform: translateY(-10px); opacity: 0; visibility: hidden; transition: all 0.2s ease; }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
        
        .modal-overlay { opacity: 0; visibility: hidden; transition: all 0.3s ease; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.show .modal-content { transform: scale(1); }

        .viewfinder-corners { position: absolute; inset: 0; pointer-events: none; z-index: 15; }
        .corner { position: absolute; width: 20px; height: 20px; border-color: rgba(255,255,255,0.5); transition: all 0.3s; }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; border-radius: 8px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; border-radius: 0 8px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; border-radius: 0 0 0 8px; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; border-radius: 0 0 8px 0; }
        .targeting .corner { border-color: var(--g-color); box-shadow: 0 0 10px var(--g-color); }
        
        .mode-camera .input-section { transform: translateY(100%); opacity: 0; pointer-events: none; }
        .mode-camera .central-block { height: 70vh; }
        .input-section { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .central-block { transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 pb-6">

    <header class="flex items-center justify-between mb-4 relative z-50">
        <div class="flex items-center gap-3">
            <canvas id="mini-qr" width="32" height="32" class="rounded-lg bg-zinc-900/50 border border-white/10"></canvas>
            <div class="flex flex-col">
                <h1 class="text-2xl font-black tracking-tighter flex gap-0.5">
                    <span class="logo-q">Q</span><span class="logo-r">R</span><span class="logo-g">G</span><span class="logo-b">B</span>
                </h1>
                <span class="text-[8px] text-zinc-500 font-mono tracking-widest uppercase">SCI Engine by M.Kashkarov</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="menu-btn" class="w-10 h-10 flex items-center justify-center text-white text-xl active:scale-90 transition-transform">☰</button>
        </div>
        
        <div id="dropdown" class="dropdown-menu absolute top-full right-0 mt-2 w-56 bg-zinc-900/95 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl z-50 overflow-hidden">
             <div class="py-0">
                <button onclick="globalReset()" class="w-full text-left px-4 py-3.5 text-xs text-red-400 hover:bg-zinc-800 font-bold uppercase tracking-wide">Reset All</button>
            </div>
        </div>
    </header>

    <div class="input-section space-y-2 mb-4 px-1">
        <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-red-600 rounded-full"></div>
            <textarea id="r-text" class="w-full p-3 pl-4 rounded-xl outline-none h-12 text-sm font-medium" placeholder="RED CHANNEL"></textarea>
        </div>
        <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-green-600 rounded-full"></div>
            <textarea id="g-text" class="w-full p-3 pl-4 rounded-xl outline-none h-12 text-sm font-medium" placeholder="GREEN CHANNEL"></textarea>
        </div>
        <div class="relative">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-full"></div>
            <textarea id="b-text" class="w-full p-3 pl-4 rounded-xl outline-none h-12 text-sm font-medium" placeholder="BLUE CHANNEL"></textarea>
        </div>
    </div>

    <div class="central-block flex-1 flex flex-col items-center justify-center relative">
        <div id="central-container" class="relative w-full max-w-xs aspect-square bg-zinc-950 rounded-3xl p-4 border border-white/5 shadow-2xl overflow-hidden">
            <div class="absolute inset-0 opacity-20 pointer-events-none" style="background: radial-gradient(circle at 20% 20%, #FF004D 0%, transparent 40%), radial-gradient(circle at 80% 80%, #0088FF 0%, transparent 40%);"></div>
            
            <canvas id="qr-main" width="512" height="512" class="w-full h-full transition-all duration-500 relative z-10"></canvas>
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden z-10" playsinline></video>
            <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover hidden z-12"></canvas>
            
            <div class="viewfinder-corners hidden" id="viewfinder-ui">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
            </div>
            <div class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50"></div>
        </div>

        <div id="result-indicators" class="w-full max-w-xs mt-4 space-y-1.5 opacity-0 transition-opacity duration-500">
            <div id="res-r" class="p-2.5 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-white/5 backdrop-blur-sm">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter font-mono flex-1 truncate">R: —</span>
            </div>
            <div id="res-g" class="p-2.5 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-white/5 backdrop-blur-sm">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter font-mono flex-1 truncate">G: —</span>
            </div>
            <div id="res-b" class="p-2.5 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-blue-500/20 backdrop-blur-sm">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-400 uppercase tracking-tighter font-mono flex-1 truncate">B: —</span>
            </div>
        </div>
    </div>

    <div class="mt-6 space-y-4">
        <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-bold rounded-2xl hidden active:scale-95 text-sm tracking-widest uppercase shadow-lg shadow-white/20">Save Result</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startCamera()" class="py-3.5 bg-zinc-900 text-white font-semibold rounded-2xl border border-white/10 active:scale-95 text-xs uppercase tracking-wider">
                <span>Камера</span>
            </button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('file-input').click()" class="py-3.5 bg-zinc-900 text-white font-semibold rounded-2xl border border-white/10 active:scale-95 text-xs uppercase tracking-wider">
                <span>Галерея</span>
            </button>
        </div>
    </div>

    <footer class="mt-8 border-t border-white/5 pt-6 pb-4 text-center">
        <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-4">Mykhailo Kashkarov | Science-Art Researcher</p>
        <p class="text-[8px] text-zinc-600">© 2026 SCI Universal Model. All Rights Reserved.</p>
    </footer>

<script>
    // === 1. STATE & CONFIG ===
    const state = {
        scanning: false,
        locked: { r: false, g: false, b: false },
        results: { r: null, g: null, b: null },
        
        // Logic
        activeSearch: false,
        standardFailCount: 0,
        AUTO_TRIGGER_THRESHOLD: 45, // ~1.5 sec to switch mode
        
        time: 0,                   // Oscillator time
        channelIndex: 0,           // Round-robin index
        
        // Fixed SCI Config
        config: {
            R: { k1: 0.10, k2: 0.20 },
            G: { k1: 0.18, k2: 0.33 },
            B: { k1: 0.05, k2: 0.13 }
        }
    };

    const els = {
        r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
        main: document.getElementById('qr-main'), mini: document.getElementById('mini-qr'),
        video: document.getElementById('video'), freeze: document.getElementById('freeze-frame'),
        ctx: document.getElementById('qr-main').getContext('2d', { willReadFrequently: true }),
        fCtx: document.getElementById('freeze-frame').getContext('2d', { willReadFrequently: true }),
        centralContainer: document.getElementById('central-container'), flash: document.getElementById('flash-layer'),
        resultIndicators: document.getElementById('result-indicators'),
        resR: document.getElementById('res-r'), resG: document.getElementById('res-g'), resB: document.getElementById('res-b'),
        viewfinder: document.getElementById('viewfinder-ui'),
        dropdown: document.getElementById('dropdown')
    };

    // === 2. ALGORITHMS ===

    // Standard Binarization (Fast)
    function applyBradleyStandard(imgData, chIdx) {
        const w = imgData.width, h = imgData.height;
        const input = imgData.data;
        const output = new Uint8ClampedArray(w * h * 4);
        const intImg = new Int32Array(w * h);
        const s = Math.floor(w / 8), t = 15;

        for (let y = 0; y < h; y++) {
            let sum = 0;
            for (let x = 0; x < w; x++) {
                sum += input[(y * w + x) * 4 + chIdx];
                intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
            }
        }

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                const count = (x2 - x1) * (y2 - y1);
                const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                const val = input[(y * w + x) * 4 + chIdx];
                const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                const idx = (y * w + x) * 4;
                output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
            }
        }
        return new ImageData(output, w, h);
    }

    // SCI Spectral Separation
    function applySCIMath(imgData, ch, cfg) {
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];
            let target, n1, n2;
            
            if (ch === 'R') { target = r; n1 = g; n2 = b; }
            else if (ch === 'G') { target = g; n1 = r; n2 = b; }
            else { target = b; n1 = r; n2 = g; }

            let res = (target - (n1 * cfg.k1 + n2 * cfg.k2)) * cfg.gain + cfg.offset;
            res = Math.max(0, Math.min(255, res));
            d[i] = res; d[i+1] = res; d[i+2] = res; d[i+3] = 255;
        }
    }

    // Oscillator for parameter sweep
    function getOscParam(t, period, min, max) {
        const cycle = t % period;
        const half = period / 2;
        const pos = (cycle < half) ? cycle / half : (period - cycle) / half;
        return min + pos * (max - min);
    }

    // === 3. MAIN PROCESSING LOOP ===
    function processLoop() {
        if (!state.scanning) return;

        // 1. Get Source Data
        let sourceCopy = null;
        if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
            els.ctx.drawImage(els.video, 0, 0, 512, 512);
            sourceCopy = els.ctx.getImageData(0, 0, 512, 512);
        } else if (!els.freeze.classList.contains('hidden')) {
            sourceCopy = els.fCtx.getImageData(0, 0, 512, 512);
        }

        if (sourceCopy) {
            // Auto-switch logic
            if (state.standardFailCount > state.AUTO_TRIGGER_THRESHOLD) {
                if (!state.activeSearch) {
                    state.activeSearch = true;
                    console.log("Switching to Active Search (Sweep Mode)");
                }
            }

            // Round-Robin Channel Selection (Process ONE channel per frame)
            const channels = ['R', 'G', 'B'];
            const activeChannels = channels.filter(ch => !state.locked[ch.toLowerCase()]);
            
            if (activeChannels.length > 0) {
                const ch = activeChannels[state.channelIndex % activeChannels.length];
                state.channelIndex++;
                
                const baseCfg = state.config[ch];
                let foundInFrame = false;

                if (state.activeSearch) {
                    // --- ACTIVE SEARCH MODE (SWEEP) ---
                    state.time++; 
                    
                    const gain = getOscParam(state.time, 100, 0.5, 3.5);
                    const offset = getOscParam(state.time, 250, -80, 0);
                    
                    const cfg = { ...baseCfg, gain, offset };

                    let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                    applySCIMath(workData, ch, cfg);
                    let mono = applyBradleyStandard(workData, 0);
                    
                    const code = jsQR(mono.data, 512, 512, { inversionAttempts: "attemptBoth" });
                    
                    if (code) {
                        lockChannel(ch, code.data);
                        foundInFrame = true;
                    }
                    
                    // Visual debug
                    if (!foundInFrame) els.ctx.putImageData(workData, 0, 0);

                } else {
                    // --- STANDARD MODE (FAST) ---
                    state.standardFailCount++;
                    
                    const idx = channels.indexOf(ch);
                    let mono = applyBradleyStandard(sourceCopy, idx);
                    const code = jsQR(mono.data, 512, 512, { inversionAttempts: "attemptBoth" });
                    
                    if (code) {
                        lockChannel(ch, code.data);
                        foundInFrame = true;
                        state.standardFailCount = 0; 
                    }
                    
                    if (!foundInFrame) els.ctx.putImageData(sourceCopy, 0, 0);
                }
            }
        }

        requestAnimationFrame(processLoop);
    }

    // === 4. SUCCESS & UI ===
    function lockChannel(ch, data) {
        const key = ch.toLowerCase(); // Fix case sensitivity
        
        if (state.locked[key]) return;
        
        state.locked[key] = true;
        state.results[key] = data;
        
        playBeep();
        flashScreen();
        
        // Update Input
        const inputEl = els[key];
        if (inputEl) inputEl.value = data;
        
        // Update Indicator
        const ind = document.querySelector(`#res-${key} .indicator`);
        const text = document.querySelector(`#res-${key} span`);
        if(ind) ind.className = `indicator active-${key}`;
        if(text) text.textContent = data.length > 20 ? data.substring(0,20)+'...' : data;
        
        els.resultIndicators.style.opacity = 1;
        
        // Visual feedback
        els.viewfinder.classList.add('targeting');
        setTimeout(() => els.viewfinder.classList.remove('targeting'), 300);

        if (state.locked.r && state.locked.g && state.locked.b) {
            stopScanning();
            generateQR();
        }
    }

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 880; o.type = "sine";
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);
            o.start(); o.stop(ctx.currentTime + 0.15);
        } catch(e){}
    }

    function flashScreen() {
        els.flash.classList.add('flash-anim');
        setTimeout(() => els.flash.classList.remove('flash-anim'), 400);
    }

    // === 5. CONTROL FLOW ===
    async function startCamera() {
        globalReset();
        els.viewfinder.classList.remove('hidden');
        els.resultIndicators.style.opacity = 0.7;
        
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1280} } });
            els.video.srcObject = s; 
            els.video.play();
            els.video.classList.remove('hidden');
            els.freeze.classList.add('hidden');

            state.scanning = true;
            requestAnimationFrame(processLoop);
        } catch(e) { alert("Camera Error: " + e); }
    }

    function stopScanning() {
        state.scanning = false;
        if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
        els.viewfinder.classList.add('hidden');
        els.video.classList.add('hidden');
        
        if (state.locked.r || state.locked.g || state.locked.b) {
            document.getElementById('save-btn').classList.remove('hidden');
        }
    }

    function handleFile(e) {
        const file = e.target.files[0]; 
        if (!file) return;
        
        globalReset();
        els.viewfinder.classList.remove('hidden');
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const s = 512;
                els.freeze.width = s; els.freeze.height = s;
                const ctx = els.fCtx;
                
                const min = Math.min(img.width, img.height);
                ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, s, s);
                
                els.freeze.classList.remove('hidden');
                els.main.style.opacity = 0;
                els.video.classList.add('hidden');

                state.scanning = true;
                state.activeSearch = true; // Use active search for files immediately
                state.standardFailCount = 100; 
                
                requestAnimationFrame(processLoop);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function globalReset() {
        stopScanning();
        
        state.locked = {r:false, g:false, b:false};
        state.results = {r:null, g:null, b:null};
        state.activeSearch = false;
        state.standardFailCount = 0;
        state.channelIndex = 0;

        els.r.value = ""; els.g.value = ""; els.b.value = "";
        
        // Reset Indicators
        ['r', 'g', 'b'].forEach(k => {
            const ind = document.querySelector(`#res-${k} .indicator`);
            const text = document.querySelector(`#res-${k} span`);
            if(ind) ind.className = 'indicator';
            if(text) text.textContent = `${k.toUpperCase()}: —`;
        });
        
        els.resultIndicators.style.opacity = 0;
        els.freeze.classList.add('hidden');
        els.video.classList.add('hidden');
        els.viewfinder.classList.add('hidden');
        
        generateQR();
    }

    function generateQR() {
        const texts = [els.r.value, els.g.value, els.b.value];
        if (!texts.some(t => t.trim())) {
            els.main.style.opacity = 0.1;
            document.getElementById('save-btn').classList.add('hidden');
            return;
        }
        els.main.style.opacity = 1;
        
        let maxVer = 1;
        texts.forEach(t => {
            if(!t.trim()) return;
            const tmp = qrcode(0, 'M'); 
            tmp.addData(unescape(encodeURIComponent(t))); tmp.make();
            const v = Math.floor((tmp.getModuleCount() - 17) / 4);
            if (v > maxVer) maxVer = v;
        });
        
        const ctx = els.ctx;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
        ctx.globalCompositeOperation = "lighten";
        
        texts.forEach((text, i) => {
            if(!text.trim()) return;
            const qr = qrcode(maxVer, 'M'); 
            qr.addData(unescape(encodeURIComponent(text))); qr.make();
            const mod = 512 / qr.getModuleCount();
            ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
            for (let r = 0; r < qr.getModuleCount(); r++) {
                for (let c = 0; c < qr.getModuleCount(); c++) {
                    if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                }
            }
        });
        ctx.globalCompositeOperation = "source-over";
        document.getElementById('save-btn').classList.remove('hidden');
        els.mini.getContext('2d').drawImage(els.main, 0, 0, 32, 32);
    }

    function saveQR() { 
        const a = document.createElement('a'); a.download = 'RGB11_Result.png'; a.href = els.main.toDataURL(); a.click(); 
    }

    // Init
    document.getElementById('menu-btn').onclick = (e) => { e.stopPropagation(); els.dropdown.classList.toggle('show'); };
    document.onclick = () => els.dropdown.classList.remove('show');
    [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
    
    generateQR();

</script>
</body>
</html>
